<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRPO Advantage Visualizer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #030712;
      --card: #111827;
      --card-border: #1f2937;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --positive: #10b981;
      --positive-glow: rgba(16, 185, 129, 0.3);
      --negative: #f43f5e;
      --negative-glow: rgba(244, 63, 94, 0.3);
    }
    
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .panel {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 24px -2px rgba(0, 0, 0, 0.5);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 8px;
    }

    .control label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .control input[type="number"] {
      background: rgba(3, 7, 18, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
      transition: all 0.2s;
    }

    .control input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .viz-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .viz-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .chart-tip {
      font-size: 12px;
      color: var(--text-muted);
    }

    .chart-container {
      width: 100%;
      height: 320px;
    }

    .sliders-panel {
      margin-top: 24px;
    }

    .sliders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .slider-card {
      background: rgba(31, 41, 55, 0.4);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .slider-card:hover {
      border-color: #374151;
    }

    .slider-card .name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      width: 24px;
      flex-shrink: 0;
    }

    .slider-card input[type="range"] {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #1f2937;
      appearance: none;
      outline: none;
      cursor: pointer;
    }

    .slider-card input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }

    .slider-card .value {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .btn {
      background: #1f2937;
      color: white;
      border: 1px solid var(--card-border);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #374151;
      border-color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      border-color: transparent;
    }

    .btn-primary:hover {
      background: #2563eb;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .formula {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 12px;
      text-align: center;
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>GRPO Advantage Visualizer</h1>
      <div style="display: flex; gap: 8px;">
        <button id="randomBtn" class="btn">Randomize</button>
        <button id="resetBtn" class="btn">Clear</button>
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="control">
          <label>Group Size (n)</label>
          <input id="numCompletions" type="number" min="2" max="64" step="1" value="4" />
        </div>
        <div class="control">
          <label>Reward Min</label>
          <input id="rewardMin" type="number" step="0.1" value="-1" />
        </div>
        <div class="control">
          <label>Reward Max</label>
          <input id="rewardMax" type="number" step="0.1" value="1" />
        </div>
        <div class="control">
          <label>Epsilon</label>
          <input id="epsilon" type="number" step="1e-8" value="1e-8" />
        </div>
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <div class="panel sliders-panel">
      <label style="display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px;">Individual Reward Controls</label>
      <div class="sliders-grid" id="sliders"></div>
    </div>

    <div class="viz-grid">
      <div class="viz-card">
        <div class="chart-header">
          <div class="chart-title">1. Reward Landscape</div>
          <div class="chart-tip">Drag bars to adjust rewards</div>
        </div>
        <div id="plot_reward" class="chart-container"></div>
      </div>

      <div class="viz-card">
        <div class="chart-header">
          <div class="chart-title">2. Computed Advantages</div>
          <div class="chart-tip">Interactive Z-Score mapping</div>
        </div>
        <div id="plot_z" class="chart-container"></div>
        <div class="formula">
          \(A_i = \frac{r_i - \bar{r}}{\sigma_r + \varepsilon}\)
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = {
      rewards: [],
      n: 4,
      min: -1,
      max: 1,
      eps: 1e-8,
      isDragging: false,
      currentDraggingType: null
    };

    const plots = {
      reward: document.getElementById('plot_reward'),
      z: document.getElementById('plot_z')
    };

    const inputs = {
      n: document.getElementById('numCompletions'),
      min: document.getElementById('rewardMin'),
      max: document.getElementById('rewardMax'),
      eps: document.getElementById('epsilon'),
      sliders: document.getElementById('sliders'),
      stats: document.getElementById('stats')
    };

    function init() {
      state.n = parseInt(inputs.n.value);
      state.min = parseFloat(inputs.min.value);
      state.max = parseFloat(inputs.max.value);
      state.rewards = Array.from({ length: state.n }, () => 
        state.min + Math.random() * (state.max - state.min)
      );
      
      inputs.n.oninput = (e) => {
        state.n = Math.max(2, Math.min(64, parseInt(e.target.value) || 2));
        state.rewards = Array(state.n).fill(0);
        buildSliders();
        update();
      };
      
      inputs.min.onchange = inputs.max.onchange = () => {
        state.min = parseFloat(inputs.min.value);
        state.max = parseFloat(inputs.max.value);
        buildSliders();
        update();
      };

      inputs.eps.oninput = (e) => { state.eps = parseFloat(e.target.value); update(); };
      
      document.getElementById('resetBtn').onclick = () => {
        state.rewards = state.rewards.map(() => 0);
        update();
      };
      
      document.getElementById('randomBtn').onclick = () => {
        state.rewards = state.rewards.map(() => state.min + Math.random() * (state.max - state.min));
        update();
      };

      setupInteractions();
      buildSliders();
      update();
    }

    function buildSliders() {
      inputs.sliders.innerHTML = '';
      state.rewards.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'slider-card';
        card.innerHTML = `
          <div class="name">C${i+1}</div>
          <input type="range" min="${state.min}" max="${state.max}" step="0.01" value="${r}">
          <div class="value">${r.toFixed(2)}</div>
        `;
        const slider = card.querySelector('input');
        slider.oninput = (e) => {
          state.rewards[i] = parseFloat(e.target.value);
          card.querySelector('.value').textContent = state.rewards[i].toFixed(2);
          update();
        };
        inputs.sliders.appendChild(card);
      });
    }

    function updateSliders() {
      const sliders = inputs.sliders.querySelectorAll('input');
      const values = inputs.sliders.querySelectorAll('.value');
      state.rewards.forEach((r, i) => {
        if (sliders[i]) sliders[i].value = r;
        if (values[i]) values[i].textContent = r.toFixed(2);
      });
    }

    function calculate() {
      const n = state.rewards.length;
      const mean = state.rewards.reduce((a, b) => a + b, 0) / n;
      const variance = state.rewards.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n;
      const std = Math.sqrt(variance);
      const zScores = state.rewards.map(r => (std === 0 ? 0 : (r - mean) / (std + state.eps)));
      return { mean, std, zScores };
    }

    function update() {
      const { mean, std, zScores } = calculate();
      
      inputs.stats.innerHTML = `
        <div class="stat-item">
          <div class="stat-label">Mean Reward</div>
          <div class="stat-value">${mean.toFixed(4)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Std Deviation</div>
          <div class="stat-value">${std.toFixed(4)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Range</div>
          <div class="stat-value">${(Math.max(...state.rewards) - Math.min(...state.rewards)).toFixed(4)}</div>
        </div>
      `;

      updateSliders();
      renderPlots(zScores);
    }

    function renderPlots(zScores) {
      const labels = state.rewards.map((_, i) => `C${i+1}`);
      
      const layout = {
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        margin: { t: 30, r: 10, b: 30, l: 40 },
        font: { color: '#6b7280', family: 'Inter', size: 10 },
        xaxis: { 
          gridcolor: '#1f2937', 
          zerolinecolor: '#374151',
          fixedrange: true,
          tickfont: { color: '#9ca3af' }
        },
        yaxis: { 
          gridcolor: '#1f2937', 
          zerolinecolor: '#374151',
          fixedrange: true,
          tickfont: { color: '#9ca3af' }
        },
        dragmode: false,
        showlegend: false
      };

      // Reward Plot
      const rewardTrace = {
        x: labels, y: state.rewards, type: 'bar',
        text: state.rewards.map(v => v.toFixed(2)),
        textposition: 'auto',
        textfont: { family: 'Inter', weight: 700, size: 11, color: '#fff' },
        marker: { 
          color: '#3b82f6',
          line: { color: '#60a5fa', width: 1.5 }
        },
        hoverinfo: 'none'
      };
      Plotly.react(plots.reward, [rewardTrace], {
        ...layout,
        yaxis: { ...layout.yaxis, range: [state.min - 0.2, state.max + 0.2] }
      }, { displayModeBar: false, responsive: true });

      // Z-Score Plot
      const zTrace = {
        x: labels, y: zScores, type: 'bar',
        text: zScores.map(v => v.toFixed(2)),
        textposition: 'outside',
        textfont: { family: 'Inter', weight: 700, size: 11, color: '#9ca3af' },
        marker: { 
          color: zScores.map(v => v >= 0 ? '#10b981' : '#f43f5e'),
          line: { 
            color: zScores.map(v => v >= 0 ? '#34d399' : '#fb7185'),
            width: 1.5 
          }
        },
        hoverinfo: 'none'
      };
      const zMax = Math.max(2, ...zScores.map(Math.abs)) * 1.3;
      Plotly.react(plots.z, [zTrace], {
        ...layout,
        yaxis: { ...layout.yaxis, range: [-zMax, zMax] }
      }, { displayModeBar: false, responsive: true });
    }

    function setupInteractions() {
      const rewardGd = plots.reward;
      const zGd = plots.z;

      function handleMove(e, chartType) {
        if (!state.isDragging) return;
        
        const gd = chartType === 'reward' ? rewardGd : zGd;
        const rect = gd.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        if (clientX === undefined || clientY === undefined) return;

        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const xVal = gd._fullLayout.xaxis.p2l(x);
        const yVal = gd._fullLayout.yaxis.p2l(y);
        
        const idx = Math.round(xVal);
        if (idx >= 0 && idx < state.n) {
          if (chartType === 'reward') {
            state.rewards[idx] = Math.max(state.min, Math.min(state.max, yVal));
          } else {
            const { mean, std } = calculate();
            const targetA = yVal;
            const newR = targetA * (std + state.eps) + mean;
            state.rewards[idx] = Math.max(state.min, Math.min(state.max, newR));
          }
          update();
        }
        if (e.cancelable) e.preventDefault();
      }

      [rewardGd, zGd].forEach(gd => {
        const type = gd === rewardGd ? 'reward' : 'advantage';
        gd.addEventListener('mousedown', (e) => {
          state.isDragging = true;
          state.currentDraggingType = type;
          handleMove(e, type);
          e.stopPropagation();
        }, true);
        gd.addEventListener('touchstart', (e) => {
          state.isDragging = true;
          state.currentDraggingType = type;
          handleMove(e.touches[0], type);
          if (e.cancelable) e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });
      });

      window.addEventListener('mousemove', (e) => handleMove(e, state.currentDraggingType), { passive: false });
      window.addEventListener('touchmove', (e) => {
        if (state.isDragging) {
          handleMove(e.touches[0], state.currentDraggingType);
          if (e.cancelable) e.preventDefault();
        }
      }, { passive: false });
      window.addEventListener('mouseup', () => { state.isDragging = false; });
      window.addEventListener('touchend', () => { state.isDragging = false; });
    }

    init();
  </script>
</body>
</html>
